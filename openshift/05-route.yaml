---
# Route — OpenShift's ingress primitive.
# Exposes the app externally at https://<host>.
#
# The host is auto-assigned by the cluster's ingress controller if left blank.
# Set it explicitly if you have a custom domain:
#   host: frc-scheduler.apps.your-cluster.example.com
#
# TLS is terminated at the router (edge termination) — traffic inside the
# cluster travels as plain HTTP, which is fine since it never leaves the cluster.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: frc-scheduler
  namespace: frc-scheduler
  labels:
    app: frc-scheduler
    app.kubernetes.io/part-of: frc-scheduler
spec:
  # host: frc-scheduler.apps.your-cluster.example.com   # optional custom domain
  to:
    kind: Service
    name: frc-scheduler
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect  # HTTP → HTTPS redirect
  wildcardPolicy: None

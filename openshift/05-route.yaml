---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: frc-scheduler-server
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
spec:
  to:
    kind: Service
    name: frc-scheduler-server
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

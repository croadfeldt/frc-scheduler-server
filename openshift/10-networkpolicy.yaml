---
# Ingress: only allow HTTPS to app pods from the HAProxy router
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frc-scheduler-allow-https-ingress
  namespace: NAMESPACE_PLACEHOLDER
spec:
  podSelector:
    matchLabels:
      app: NAMESPACE_PLACEHOLDER-git
  policyTypes: [Ingress]
  ingress:
    - ports:
        - port: 8443
          protocol: TCP
---
# Ingress: postgres only accepts connections from app pods and build pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frc-scheduler-allow-postgres-ingress
  namespace: NAMESPACE_PLACEHOLDER
spec:
  podSelector:
    matchLabels:
      app: frc-postgres
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: NAMESPACE_PLACEHOLDER-git
        - podSelector:
            matchExpressions:
              - key: openshift.io/build.name
                operator: Exists
      ports:
        - port: 5432
          protocol: TCP
---
# EgressNetworkPolicy (OpenShift-native): operates at node level before NAT,
# correctly handles service VIPs and DNS unlike standard NetworkPolicy egress.
# Allows only the specific external services the app needs; denies everything else
# including all internal cluster and RFC1918 networks.
apiVersion: network.openshift.io/v1
kind: EgressNetworkPolicy
metadata:
  name: frc-scheduler-egress-policy
  namespace: NAMESPACE_PLACEHOLDER
spec:
  egress:
    # Allow DNS (cluster DNS service VIP)
    - type: Allow
      to:
        cidr: 172.30.0.10/32
    # Allow Kubernetes API server (service account token validation)
    - type: Allow
      to:
        cidr: 172.30.0.1/32
    # Allow internal image registry (image pulls)
    - type: Allow
      to:
        dnsName: image-registry.openshift-image-registry.svc
    # Allow postgres within the namespace — handled by pod-level NetworkPolicy above.
    # EgressNetworkPolicy does not apply to same-namespace pod-to-pod traffic
    # in OVN-Kubernetes, so no rule needed here for frc-postgres.

    # Allow external APIs the app legitimately calls
    - type: Allow
      to:
        dnsName: www.thebluealliance.com
    - type: Allow
      to:
        dnsName: thebluealliance.com
    - type: Allow
      to:
        dnsName: frc-api.firstinspires.org
    - type: Allow
      to:
        dnsName: accounts.google.com
    - type: Allow
      to:
        dnsName: oauth2.googleapis.com
    - type: Allow
      to:
        dnsName: www.googleapis.com
    - type: Allow
      to:
        dnsName: appleid.apple.com
    # Allow NooBaa S3 internal endpoint (image registry blob storage)
    - type: Allow
      to:
        dnsName: s3.openshift-storage.svc

    # DENY everything else — all RFC1918, all other cluster-internal,
    # all internet destinations not explicitly allowed above.
    - type: Deny
      to:
        cidr: 0.0.0.0/0

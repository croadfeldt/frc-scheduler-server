---
# Ingress: only allow HTTPS to app pods from the HAProxy router
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frc-scheduler-allow-https-ingress
  namespace: NAMESPACE_PLACEHOLDER
spec:
  podSelector:
    matchLabels:
      app: NAMESPACE_PLACEHOLDER-git
  policyTypes: [Ingress]
  ingress:
    - ports:
        - port: 8443
          protocol: TCP
---
# Ingress: postgres only accepts connections from app pods and build pods.
# Postgres has no external route so this is belt-and-suspenders — nothing
# outside the namespace can reach it regardless.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frc-scheduler-allow-postgres-ingress
  namespace: NAMESPACE_PLACEHOLDER
spec:
  podSelector:
    matchLabels:
      app: frc-postgres
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: NAMESPACE_PLACEHOLDER-git
        - podSelector:
            matchExpressions:
              - key: openshift.io/build.name
                operator: Exists
      ports:
        - port: 5432
          protocol: TCP

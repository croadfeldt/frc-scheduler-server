---
# CronJob: restart deployment weekly to pick up renewed TLS certs.
# Replace with Reloader annotation if stakater/Reloader is installed.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cert-renewal-restart
  namespace: frc-scheduler-server
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: build-trigger-sa
          restartPolicy: OnFailure
          containers:
            - name: restarter
              image: registry.redhat.io/openshift4/ose-cli:latest
              command:
                - /bin/sh
                - -c
                - oc rollout restart deployment/frc-scheduler-server -n frc-scheduler-server

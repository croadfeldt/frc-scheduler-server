---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: NAMESPACE_PLACEHOLDER
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app: NAMESPACE_PLACEHOLDER-git
spec:
  replicas: 2
  selector:
    matchLabels:
      app: NAMESPACE_PLACEHOLDER-git
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: NAMESPACE_PLACEHOLDER-git
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: NAMESPACE_PLACEHOLDER-git
      securityContext:
        runAsNonRoot: true
      volumes:
        - name: tls-certs
          secret:
            secretName: frc-scheduler-tls
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres at frc-postgres:5432..."
              until pg_isready -h frc-postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "  postgres not ready — retrying in 3s..."
                sleep 3
              done
              echo "Postgres is ready and database '$POSTGRES_DB' exists."
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_DB
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: NAMESPACE_PLACEHOLDER
          image: image-registry.openshift-image-registry.svc:5000/NAMESPACE_PLACEHOLDER/NAMESPACE_PLACEHOLDER-git:latest
          imagePullPolicy: Always
          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_DB
            - name: POSTGRES_HOST
              value: "frc-postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: DATABASE_URL
            - name: TBA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: frc-app-secret
                  key: TBA_API_KEY
            - name: CPU_WORKERS
              value: "CPU_WORKERS_PLACEHOLDER"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: APP_PORT
              value: "APP_PORT_PLACEHOLDER"
            - name: WEB_WORKERS
              value: "WEB_WORKERS_PLACEHOLDER"
            - name: SSL_CERTFILE
              value: "/certs/tls.crt"
            - name: SSL_KEYFILE
              value: "/certs/tls.key"
            - name: ALLOWED_ORIGINS
              value: "ALLOWED_ORIGINS_PLACEHOLDER"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: frc-auth-secret
                  key: JWT_SECRET
            - name: BASE_URL
              valueFrom:
                secretKeyRef:
                  name: frc-auth-secret
                  key: BASE_URL
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: frc-auth-secret
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: frc-auth-secret
                  key: GOOGLE_CLIENT_SECRET
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /api/health
              port: 8443
              scheme: HTTPS
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 0
            periodSeconds: 5
          resources:
            requests:
              cpu: "4"
              memory: "1Gi"
            limits:
              cpu: "12"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: NAMESPACE_PLACEHOLDER
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app: NAMESPACE_PLACEHOLDER-git
  annotations:
    # MetalLB: request a specific IP from the server-vlan pool
    metallb.universe.tf/loadBalancerIPs: METALLB_IP_PLACEHOLDER
    metallb.universe.tf/address-pool: METALLB_POOL_PLACEHOLDER
spec:
  type: LoadBalancer
  selector:
    app: NAMESPACE_PLACEHOLDER-git
  ports:
    - name: https
      port: 8088
      targetPort: 8443
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: NAMESPACE_PLACEHOLDER-pdb
  namespace: NAMESPACE_PLACEHOLDER
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: NAMESPACE_PLACEHOLDER-git

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frc-scheduler-server
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frc-scheduler-server-git
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: frc-scheduler-server-git
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: frc-scheduler-server-git
      securityContext:
        runAsNonRoot: true
      volumes:
        - name: tls-certs
          secret:
            secretName: frc-scheduler-tls
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z frc-postgres 5432; do echo 'Waiting for postgres...'; sleep 2; done"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: frc-scheduler-server
          image: image-registry.openshift-image-registry.svc:5000/frc-scheduler-server/frc-scheduler-server-git:latest
          imagePullPolicy: Always
          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_PASSWORD
            - name: PGDB
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(PGUSER):$(PGPASSWORD)@frc-postgres:5432/$(PGDB)"
            - name: TBA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: frc-app-secret
                  key: TBA_API_KEY
            - name: CPU_WORKERS
              value: "12"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: APP_PORT
              value: "8443"
            - name: WEB_WORKERS
              value: "1"
            - name: SSL_CERTFILE
              value: "/certs/tls.crt"
            - name: SSL_KEYFILE
              value: "/certs/tls.key"
            - name: ALLOWED_ORIGINS
              value: "https://YOUR_HOSTNAME"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: frc-auth-secret
                  key: JWT_SECRET
            - name: BASE_URL
              valueFrom:
                secretKeyRef:
                  name: frc-auth-secret
                  key: BASE_URL
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: frc-auth-secret
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: frc-auth-secret
                  key: GOOGLE_CLIENT_SECRET
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /api/health
              port: 8443
              scheme: HTTPS
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 0
            periodSeconds: 5
          resources:
            requests:
              cpu: "4"
              memory: "1Gi"
            limits:
              cpu: "12"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: frc-scheduler-server
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
spec:
  selector:
    app: frc-scheduler-server-git
  ports:
    - name: https
      port: 8443
      targetPort: 8443
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frc-scheduler-server-pdb
  namespace: frc-scheduler-server
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frc-scheduler-server-git

---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    alpha.image.policy.openshift.io/resolve-names: '*'
    app.openshift.io/route-disabled: "false"
    app.openshift.io/vcs-ref: ""
    app.openshift.io/vcs-uri: https://github.com/YOUR_ORG/YOUR_REPO.git
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"frc-scheduler-server-git:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"frc-scheduler-server\")].image"}]'
    # stakater/Reloader: automatically triggers a rolling restart when the
    # frc-scheduler-tls Secret is updated by cert-manager on cert renewal.
    secret.reloader.stakater.com/reload: "frc-scheduler-tls"
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/component: frc-scheduler-server-git
    app.kubernetes.io/instance: frc-scheduler-server-git
    app.kubernetes.io/name: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
  name: frc-scheduler-server
  namespace: frc-scheduler-server
spec:
  progressDeadlineSeconds: 600
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: frc-scheduler-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # allow 3 pods during rollout
      maxUnavailable: 0  # never take a pod down before a new one is ready
  template:
    metadata:
      labels:
        app: frc-scheduler-server
        deployment: frc-scheduler-server
    spec:
      # Spread pods across different nodes so each gets its own 16-CPU node
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: frc-scheduler-server
      securityContext:
        runAsNonRoot: true

      volumes:
        - name: tls-certs
          secret:
            secretName: frc-scheduler-tls  # populated by cert-manager

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z frc-postgres 5432; do echo 'Waiting for postgres...'; sleep 2; done"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]

      containers:
        - name: frc-scheduler-server
          image: image-registry.openshift-image-registry.svc:5000/frc-scheduler-server/frc-scheduler-server-git:latest
          imagePullPolicy: Always

          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true

          env:
            # Assemble DATABASE_URL from the DB secret
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_PASSWORD
            - name: PGDB
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(PGUSER):$(PGPASSWORD)@frc-postgres:5432/$(PGDB)"
            - name: TBA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: frc-app-secret
                  key: TBA_API_KEY
            - name: CPU_WORKERS
              value: "12"   # 12 SA workers per pod; 2 pods = 24 total across cluster
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: APP_PORT
              value: "8443"   # HTTPS port — unprivileged (no root needed)
            - name: WEB_WORKERS
              value: "1"    # 1 uvicorn process owns the full pool — no inter-process contention
            - name: SSL_CERTFILE
              value: "/certs/tls.crt"
            - name: SSL_KEYFILE
              value: "/certs/tls.key"
            - name: ALLOWED_ORIGINS
              value: "https://YOUR_HOSTNAME"  # substituted by apply.sh
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false

          # startupProbe runs once at startup — gives the app up to 60s to
          # initialise (DB, pool, worker spawn) without triggering restarts.
          # Once it passes, readinessProbe takes over with tight intervals.
          startupProbe:
            httpGet:
              path: /api/health
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 20   # 5s + 20×3s = up to 65s before restart

          readinessProbe:
            httpGet:
              path: /api/health
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/health
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3

          resources:
            requests:
              cpu:    "4"    # guaranteed 4 CPUs at all times per pod
              memory: 512Mi
            limits:
              cpu:    "12"   # burst to 12 CPUs per pod (leaves 4 for OS/other pods per node)
              memory: 1Gi

          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File

      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frc-scheduler-server
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
spec:
  selector:
    app: frc-scheduler-server
  ports:
    - name: https
      port: 443
      targetPort: 8443
  type: ClusterIP
---
# Keep at least 1 pod available during voluntary disruptions (node drain, rollout)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frc-scheduler-server-pdb
  namespace: frc-scheduler-server
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frc-scheduler-server

    app: frc-scheduler-server-git
    app.kubernetes.io/component: frc-scheduler-server-git
    app.kubernetes.io/instance: frc-scheduler-server-git
    app.kubernetes.io/name: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
  name: frc-scheduler-server
  namespace: frc-scheduler-server
spec:
  progressDeadlineSeconds: 600
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: frc-scheduler-server
  strategy:
    type: RollingUpdate
    rollingUpdate:

            - name: PYTHONUNBUFFERED
              value: "1"
            - name: APP_PORT
              value: "8080"
            - name: WEB_WORKERS
              value: "1"    # 1 uvicorn process owns the full pool — no inter-process contention
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"

          securityContext:
            allowPrivilegeEscalation: false

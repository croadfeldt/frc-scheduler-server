      containers:
        - name: frc-scheduler-server
          image: image-registry.openshift-image-registry.svc:5000/frc-scheduler-server/frc-scheduler-server-git:latest
          imagePullPolicy: Always

          env:
            # Assemble DATABASE_URL from the DB secret
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_PASSWORD
            - name: PGDB
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret

---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    alpha.image.policy.openshift.io/resolve-names: '*'
    app.openshift.io/route-disabled: "false"
    app.openshift.io/vcs-ref: ""
    app.openshift.io/vcs-uri: https://github.com/croadfeldt/frc-scheduler-server.git
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"frc-scheduler-server-git:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"frc-scheduler-server\")].image"}]'
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/component: frc-scheduler-server-git
    app.kubernetes.io/instance: frc-scheduler-server-git
    app.kubernetes.io/name: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
  name: frc-scheduler-server
  namespace: frc-scheduler-server
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: frc-scheduler-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: frc-scheduler-server
        deployment: frc-scheduler-server
    spec:
      securityContext:
        runAsNonRoot: true

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z frc-postgres 5432; do echo 'Waiting for postgres...'; sleep 2; done"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]

      containers:
        - name: frc-scheduler-server
          image: image-registry.openshift-image-registry.svc:5000/frc-scheduler-server/frc-scheduler-server-git:latest
          imagePullPolicy: Always

          env:
            # Assemble DATABASE_URL from the DB secret
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_PASSWORD
            - name: PGDB
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(PGUSER):$(PGPASSWORD)@frc-postgres:5432/$(PGDB)"
            - name: TBA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: frc-app-secret
                  key: TBA_API_KEY
            - name: CPU_WORKERS
              value: "0"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: APP_PORT
              value: "8080"
            - name: WEB_WORKERS
              value: "4"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false

          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          resources:
            requests:
              cpu:    500m
              memory: 512Mi
            limits:
              cpu:    "2"
              memory: 1Gi

          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File

      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frc-scheduler-server
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
spec:
  selector:
    app: frc-scheduler-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP

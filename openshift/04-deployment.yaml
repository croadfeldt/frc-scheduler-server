apiVersion: v1
kind: Service
metadata:
  name: frc-scheduler-server
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
spec:
  selector:
    app: frc-scheduler-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Keep at least 1 pod available during voluntary disruptions (node drain, rollout)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frc-scheduler-server-pdb
  namespace: frc-scheduler-server
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frc-scheduler-server
---
# MetalLB LoadBalancer Service — exposes the scheduler directly to the outside
# world via BGP VIP. Traffic flows: Client → Firewall → MetalLB VIP → Pod (HTTPS).
# The ClusterIP Service above is used for internal cluster traffic (e.g. from
# the OpenShift router if the Route is also kept).
apiVersion: v1
kind: Service
metadata:
  name: frc-scheduler-server-lb
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
  annotations:
    metallb.universe.tf/loadBalancerIPs: ""   # leave blank to use pool default,
                                               # or set to a specific IP from your pool
spec:
  selector:
    app: frc-scheduler-server
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
  type: LoadBalancer
  externalTrafficPolicy: Local   # preserves client source IP; avoids extra hop

---
# ServiceAccount for the build-trigger CronJob
apiVersion: v1
kind: ServiceAccount
metadata:
  name: build-trigger-sa
  namespace: NAMESPACE_PLACEHOLDER
---
# Role: permission to start builds and restart deployments
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: build-trigger-role
  namespace: NAMESPACE_PLACEHOLDER
rules:
  - apiGroups: ["build.openshift.io"]
    resources: ["buildconfigs/instantiate"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps.openshift.io"]
    resources: ["deploymentconfigs"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: build-trigger-binding
  namespace: NAMESPACE_PLACEHOLDER
subjects:
  - kind: ServiceAccount
    name: build-trigger-sa
    namespace: NAMESPACE_PLACEHOLDER
roleRef:
  kind: Role
  name: build-trigger-role
  apiGroup: rbac.authorization.k8s.io

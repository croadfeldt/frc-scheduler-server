---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frc-postgres-data
  namespace: frc-scheduler-server
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frc-postgres
  namespace: frc-scheduler-server
  labels:
    app: frc-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frc-postgres
  template:
    metadata:
      labels:
        app: frc-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_DB
            # PGDATA must point to a subdirectory of the mount — the PVC root
            # contains a lost+found directory which prevents initdb from running.
            # If existing data is already at /var/lib/postgresql/data/pgdata
            # (the postgres:16 image default) this is a no-op.
            # If existing data is at the PVC root, see migration note below.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "frc"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "frc"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: frc-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: frc-postgres
  namespace: frc-scheduler-server
  labels:
    app: frc-postgres
spec:
  selector:
    app: frc-postgres
  ports:
    - port: 5432
      targetPort: 5432

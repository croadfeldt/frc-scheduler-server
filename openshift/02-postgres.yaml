---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frc-postgres-data
  namespace: NAMESPACE_PLACEHOLDER
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frc-postgres
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app: frc-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frc-postgres
  template:
    metadata:
      labels:
        app: frc-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: frc-db-secret
                  key: POSTGRES_DB
            # PGDATA must point to a subdirectory — PVC root contains lost+found
            # which prevents initdb. postgres:16 defaults to this path anyway.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          # Readiness probe verifies the actual app database exists, not just
          # that the postgres process is accepting connections. This prevents
          # the deployment from reporting Ready before initdb has finished
          # creating the POSTGRES_DB database.
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -h 127.0.0.1 -U "$POSTGRES_USER"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: frc-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: frc-postgres
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app: frc-postgres
spec:
  selector:
    app: frc-postgres
  ports:
    - port: 5432
      targetPort: 5432

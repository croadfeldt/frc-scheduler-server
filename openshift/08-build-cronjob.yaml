---
# CronJob: poll git every 5 minutes and start a build if HEAD changed.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: git-poll-trigger
  namespace: NAMESPACE_PLACEHOLDER
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: build-trigger-sa
          restartPolicy: OnFailure
          containers:
            - name: git-poll
              image: registry.redhat.io/openshift4/ose-cli:latest
              env:
                - name: GIT_REPO_URL
                  value: "https://github.com/YOUR_ORG/YOUR_REPO.git"
                - name: GIT_BRANCH
                  value: "GIT_BRANCH_PLACEHOLDER"
                - name: NAMESPACE
                  value: "NAMESPACE_PLACEHOLDER"
                - name: BUILD_CONFIG
                  value: "frc-scheduler-server-git"  # this is the fixed BuildConfig name, not the namespace
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  REMOTE_HEAD=$(git ls-remote "$GIT_REPO_URL" "refs/heads/${GIT_BRANCH}" | cut -f1)
                  LAST_BUILD=$(oc get bc "$BUILD_CONFIG" -n "$NAMESPACE" \
                    -o jsonpath='{.status.lastVersion}' 2>/dev/null || echo "0")
                  LAST_COMMIT=$(oc get build "${BUILD_CONFIG}-${LAST_BUILD}" \
                    -n "$NAMESPACE" \
                    -o jsonpath='{.spec.revision.git.commit}' 2>/dev/null || echo "")
                  if [ "$REMOTE_HEAD" != "$LAST_COMMIT" ]; then
                    echo "New commit detected: $REMOTE_HEAD (was: $LAST_COMMIT)"
                    oc start-build "$BUILD_CONFIG" -n "$NAMESPACE"
                  else
                    echo "No change at $REMOTE_HEAD"
                  fi

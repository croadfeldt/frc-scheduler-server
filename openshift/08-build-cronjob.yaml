---
# CronJob: poll git every 5 minutes and start a build if HEAD changed.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: git-poll-trigger
  namespace: frc-scheduler-server
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: build-trigger-sa
          restartPolicy: OnFailure
          containers:
            - name: git-poll
              image: registry.redhat.io/openshift4/ose-cli:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  REPO="https://github.com/YOUR_ORG/YOUR_REPO.git"
                  REMOTE_HEAD=$(git ls-remote "$REPO" refs/heads/main | cut -f1)
                  LAST_BUILD=$(oc get bc frc-scheduler-server-git -n frc-scheduler-server \
                    -o jsonpath='{.status.lastVersion}' 2>/dev/null || echo "0")
                  LAST_COMMIT=$(oc get build frc-scheduler-server-git-${LAST_BUILD} \
                    -n frc-scheduler-server \
                    -o jsonpath='{.spec.revision.git.commit}' 2>/dev/null || echo "")
                  if [ "$REMOTE_HEAD" != "$LAST_COMMIT" ]; then
                    echo "New commit detected: $REMOTE_HEAD (was: $LAST_COMMIT)"
                    oc start-build frc-scheduler-server-git -n frc-scheduler-server
                  else
                    echo "No change at $REMOTE_HEAD"
                  fi

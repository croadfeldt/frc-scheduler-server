# PVC for caching the vLLM model weights.
#
# vLLM downloads the model from Hugging Face on first start (~9GB for
# Qwen2.5-VL-7B-Instruct-AWQ). Without persistent storage, every pod
# restart re-downloads — slow and wasteful. The PVC keeps weights local
# to the cluster.
#
# 10Gi gives ~1Gi headroom over the model size for HF cache metadata.
# If you swap to a larger model later (Qwen2.5-VL-72B-AWQ is ~50Gi),
# resize the PVC accordingly.
#
# STORAGE CLASS: this PVC uses the cluster's default StorageClass (no
# `storageClassName` field). This matches the pattern used by the rest
# of the deployment (see 02-postgres.yaml) and works on any cluster
# with a default class set. To check your cluster's default:
#   oc get storageclass
# (look for the one annotated as default — usually has `(default)`
# next to its name)
#
# If you need to pin to a specific class — e.g. you have multiple and
# want fast SSD for model loading, or your cluster has no default —
# add `storageClassName: <your-class>` under spec.
#
# NOT suitable for NooBaa S3 / object storage — model weights need
# block or filesystem storage.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-model-cache
  namespace: vllm-vision
  labels:
    app: vllm-vision
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

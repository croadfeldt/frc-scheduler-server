---
# Database credentials
# Apply with:
#   oc create secret generic frc-db-secret \
#     --from-literal=POSTGRES_USER=frc \
#     --from-literal=POSTGRES_PASSWORD=changeme \
#     --from-literal=POSTGRES_DB=frc_scheduler \
#     -n frc-scheduler-server
apiVersion: v1
kind: Secret
metadata:
  name: frc-db-secret
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
type: Opaque
stringData:
  POSTGRES_USER:     frc
  POSTGRES_PASSWORD: changeme
  POSTGRES_DB:       frc_scheduler
---
# TBA API key
apiVersion: v1
kind: Secret
metadata:
  name: frc-app-secret
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
type: Opaque
stringData:
  TBA_API_KEY: ""
---
# GitHub PAT for the cronjob git poller — matches secret name in build-cronjob.yaml
apiVersion: v1
kind: Secret
metadata:
  name: git-contents-token
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
type: Opaque
stringData:
  token: ""
---
# Authentication secrets
# JWT_SECRET: openssl rand -hex 32
# GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET: https://console.cloud.google.com/apis/credentials
#   Authorized redirect URI: https://<your-route-host>/auth/google/callback
# APPLE_*: https://developer.apple.com/account/resources/identifiers
#   Service ID redirect URI: https://<your-route-host>/auth/apple/callback
apiVersion: v1
kind: Secret
metadata:
  name: frc-auth-secret
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
type: Opaque
stringData:
  JWT_SECRET:           ""          # ← openssl rand -hex 32
  BASE_URL:             ""          # ← https://frc-scheduler-server-frc-scheduler-server.apps.your-cluster
  GOOGLE_CLIENT_ID:     ""
  GOOGLE_CLIENT_SECRET: ""
  APPLE_CLIENT_ID:      ""
  APPLE_TEAM_ID:        ""
  APPLE_KEY_ID:         ""
  APPLE_PRIVATE_KEY:    ""          # PEM with \n for newlines

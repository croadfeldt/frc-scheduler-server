---
# Database credentials
# Apply with:
#   oc create secret generic frc-db-secret \
#     --from-literal=POSTGRES_USER=frc \
#     --from-literal=POSTGRES_PASSWORD=changeme \
#     --from-literal=POSTGRES_DB=frc_scheduler \
#     -n frc-scheduler-server
apiVersion: v1
kind: Secret
metadata:
  name: frc-db-secret
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
type: Opaque
stringData:
  POSTGRES_USER:     frc
  POSTGRES_PASSWORD: changeme
  POSTGRES_DB:       frc_scheduler
---
# TBA API key
apiVersion: v1
kind: Secret
metadata:
  name: frc-app-secret
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
type: Opaque
stringData:
  TBA_API_KEY: ""
---
# GitHub PAT for the cronjob git poller — matches secret name in build-cronjob.yaml
apiVersion: v1
kind: Secret
metadata:
  name: git-contents-token
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
    app.kubernetes.io/part-of: frc-scheduler-server-git-app
type: Opaque
stringData:
  token: ""

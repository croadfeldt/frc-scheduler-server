---
# Database credentials
# Edit the values (base64-encoded) or use:
#   oc create secret generic frc-db-secret \
#     --from-literal=POSTGRES_USER=frc \
#     --from-literal=POSTGRES_PASSWORD=changeme \
#     --from-literal=POSTGRES_DB=frc_scheduler \
#     -n frc-scheduler
apiVersion: v1
kind: Secret
metadata:
  name: frc-db-secret
  namespace: frc-scheduler
  labels:
    app.kubernetes.io/part-of: frc-scheduler
type: Opaque
stringData:
  POSTGRES_USER:     frc
  POSTGRES_PASSWORD: changeme          # ← change before deploying
  POSTGRES_DB:       frc_scheduler
---
# App secrets — DATABASE_URL is assembled from the DB secret in the Deployment.
# TBA API key: get one free at https://www.thebluealliance.com/account
apiVersion: v1
kind: Secret
metadata:
  name: frc-app-secret
  namespace: frc-scheduler
  labels:
    app.kubernetes.io/part-of: frc-scheduler
type: Opaque
stringData:
  TBA_API_KEY: ""                      # ← paste your TBA key here

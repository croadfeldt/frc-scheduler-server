---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: frc-scheduler-server-git
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
spec:
  lookupPolicy:
    local: true
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: frc-scheduler-server-git
  namespace: frc-scheduler-server
  labels:
    app: frc-scheduler-server-git
spec:
  failedBuildsHistoryLimit: 5
  successfulBuildsHistoryLimit: 5
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/YOUR_ORG/YOUR_REPO.git
      ref: refs/heads/main
    contextDir: /
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile.openshift
  output:
    to:
      kind: ImageStreamTag
      name: frc-scheduler-server-git:latest
  triggers:
    - type: ConfigChange

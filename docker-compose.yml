services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     frc
      POSTGRES_PASSWORD: frc
      POSTGRES_DB:       frc_scheduler
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frc"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Containerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://frc:frc@db:5432/frc_scheduler
      TBA_API_KEY:  ${TBA_API_KEY:-}        # set in .env
      CPU_WORKERS:  ${CPU_WORKERS:-0}       # 0 = auto-detect (os.cpu_count())
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount static files so you can update the frontend without rebuilding
      - ./static:/app/static:ro

  # Optional: pgAdmin for inspecting the database
  # Uncomment to enable, then visit http://localhost:5050
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@frc.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - db

volumes:
  pgdata:
